# Array Mic Refreshment — Skill manifest
# 正文一律读 skills/upstream/ 下第三方原文 + array-mic 栈末约束（拼接用）

version: 2

# LLM #1：意图分类（上游 prompt）
# 仅当用户选择「自动判断」时启用
router:
  system_prompt_file: upstream/shanttoosh/voice-controlled-ai-agent.intent-classification.md
  intent_map:
    write_code: code-editing
    general_chat: general-ai
    summarize: research
    create_file: task-plan

# LLM #2：Skill stack（用户在下拉框中选择）
specialists:
  plain-text:
    name: "纯文本整理"
    description: "去除口误、加标点、修正语序，输出适合人类阅读的书面语（短 prompt，省 token）"
    stack:
      - upstream/array-mic/plain-text-polish.md

  general-ai:
    name: "通用 AI Prompt"
    description: "把语音整理成通用 AI 提示词（不扩写）"
    stack:
      - upstream/danielrosehill/stt-basic-cleanup.minimal.md
      - upstream/danielrosehill/text-transform/general-prompt.md
      - upstream/array-mic/stack-output-fidelity.md

  # 本应用主场景：程序开发，但输出是「产品需求」而非「改哪几个函数」
  code-editing:
    name: "软件开发需求（产品视角）"
    description: "口述需求 → 页面/流程/步骤化说明；不写接口、框架、函数名（避免误导）"
    stack:
      - upstream/danielrosehill/stt-basic-cleanup.minimal.md
      - upstream/array-mic/software-product-requirements.md
      - upstream/array-mic/stack-output-fidelity.md

  research:
    name: "深度研究 Prompt"
    description: "口述研究意图 → 给 Deep Research 等工具用的检索提示（与待办列表无关）"
    stack:
      - upstream/danielrosehill/stt-basic-cleanup.minimal.md
      - upstream/danielrosehill/text-transform/deep-research-prompt.md
      - upstream/array-mic/stack-research-fidelity.md
      - upstream/array-mic/stack-output-fidelity.md

  task-plan:
    name: "待办列表"
    description: "口述 → 简短可执行待办（动词开头）；不是产品需求长文，也不是深度研究"
    stack:
      - upstream/danielrosehill/stt-basic-cleanup.minimal.md
      - upstream/danielrosehill/text-transform/to-do-list.md
      - upstream/array-mic/stack-output-fidelity.md

# 可选叠加 skill（设置页勾选）
optional_skills:
  voice_refine:
    file: upstream/florianbruniaux/voice-refine.SKILL.md
    note: "口述结构化；与「软件开发需求」同用易偏模板，一般不必勾选"

  dictation_cleanup:
    file: upstream/majiayu000/dictation-githubnext-gh-aw-2.SKILL.md
    note: "GitHub gh-aw 听写纠错 Skill — 偏 GitHub/英文术语"

# 设置页选择 skill 时直接按 specialists 键名匹配
