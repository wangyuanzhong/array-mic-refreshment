name: CI

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore ArrayMicRefreshment.CI.slnf

      - name: Build
        run: |
          ./scripts/build-libraries.sh
          dotnet build tests/ArrayMicRefreshment.Core.Tests/ArrayMicRefreshment.Core.Tests.csproj -c Release --no-restore
          dotnet build tests/ArrayMicRefreshment.Audio.Tests/ArrayMicRefreshment.Audio.Tests.csproj -c Release --no-restore
          dotnet build tests/ArrayMicRefreshment.Prompt.Tests/ArrayMicRefreshment.Prompt.Tests.csproj -c Release --no-restore

      - name: Test
        run: |
          dotnet test tests/ArrayMicRefreshment.Core.Tests/ArrayMicRefreshment.Core.Tests.csproj -c Release --no-build --verbosity normal
          dotnet test tests/ArrayMicRefreshment.Audio.Tests/ArrayMicRefreshment.Audio.Tests.csproj -c Release --no-build --verbosity normal
          dotnet test tests/ArrayMicRefreshment.Prompt.Tests/ArrayMicRefreshment.Prompt.Tests.csproj -c Release --no-build --verbosity normal

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build Web UI
        shell: pwsh
        run: |
          Push-Location ui
          npm ci
          npm run build
          Pop-Location
          if (-not (Test-Path src/ArrayMicRefreshment.App/wwwroot/index.html)) {
            throw "wwwroot/index.html missing after npm run build"
          }

      - name: Restore
        run: dotnet restore ArrayMicRefreshment.sln

      - name: Build
        run: dotnet build ArrayMicRefreshment.sln -c Release --no-restore

      - name: Test App unit tests
        run: dotnet test tests/ArrayMicRefreshment.App.Tests/ArrayMicRefreshment.App.Tests.csproj -c Release --no-build --verbosity normal

      - name: Test solution (exclude integration and tray smoke)
        run: dotnet test ArrayMicRefreshment.sln -c Release --no-build --verbosity normal --filter "FullyQualifiedName!~Integration&Category!=TraySmoke"
