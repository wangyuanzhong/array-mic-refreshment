name: CI

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Optional note (shown in run summary)'
        required: false
        default: 'manual'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Run context
        run: |
          echo "## CI run" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Event:** \`${{ github.event_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **SHA:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ github.event.inputs.reason }}" ]; then
            echo "- **Note:** ${{ github.event.inputs.reason }}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore ArrayMicRefreshment.CI.slnf

      - name: Build
        run: |
          ./scripts/build-libraries.sh
          dotnet build tests/ArrayMicRefreshment.Core.Tests/ArrayMicRefreshment.Core.Tests.csproj -c Release --no-restore
          dotnet build tests/ArrayMicRefreshment.Audio.Tests/ArrayMicRefreshment.Audio.Tests.csproj -c Release --no-restore
          dotnet build tests/ArrayMicRefreshment.Prompt.Tests/ArrayMicRefreshment.Prompt.Tests.csproj -c Release --no-restore

      - name: Test
        run: |
          dotnet test tests/ArrayMicRefreshment.Core.Tests/ArrayMicRefreshment.Core.Tests.csproj -c Release --no-build --verbosity normal
          dotnet test tests/ArrayMicRefreshment.Audio.Tests/ArrayMicRefreshment.Audio.Tests.csproj -c Release --no-build --verbosity normal
          dotnet test tests/ArrayMicRefreshment.Prompt.Tests/ArrayMicRefreshment.Prompt.Tests.csproj -c Release --no-build --verbosity normal

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Run context
        shell: pwsh
        run: |
          @"
          ## CI run (Windows)
          - **Branch:** ``${{ github.ref_name }}``
          - **Event:** ``${{ github.event_name }}``
          - **SHA:** ``${{ github.sha }}``
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build Web UI
        shell: pwsh
        run: |
          Push-Location ui
          npm ci
          npm run build
          Pop-Location
          if (-not (Test-Path src/ArrayMicRefreshment.App/wwwroot/index.html)) {
            throw "wwwroot/index.html missing after npm run build"
          }

      - name: Restore
        run: dotnet restore ArrayMicRefreshment.sln

      - name: Build
        run: dotnet build ArrayMicRefreshment.sln -c Release --no-restore

      - name: Test App.Tests (Windows)
        shell: pwsh
        env:
          VSTEST_TESTCASE_TIMEOUT: "120000"
          DOTNET_TEST_RUNNER_DIAGNOSTICS: "1"
        run: >
          dotnet test tests/ArrayMicRefreshment.App.Tests/ArrayMicRefreshment.App.Tests.csproj
          -c Release --no-build --verbosity normal
          --blame-hang
          --blame-hang-timeout 2m
          --blame-crash
          -- RunConfiguration.MaxCpuCount=1

      - name: Test Core.Tests
        shell: pwsh
        run: >
          dotnet test tests/ArrayMicRefreshment.Core.Tests/ArrayMicRefreshment.Core.Tests.csproj
          -c Release --no-build --verbosity normal

      - name: Test Audio.Tests
        shell: pwsh
        run: >
          dotnet test tests/ArrayMicRefreshment.Audio.Tests/ArrayMicRefreshment.Audio.Tests.csproj
          -c Release --no-build --verbosity normal

      - name: Test Prompt.Tests
        shell: pwsh
        run: >
          dotnet test tests/ArrayMicRefreshment.Prompt.Tests/ArrayMicRefreshment.Prompt.Tests.csproj
          -c Release --no-build --verbosity normal
