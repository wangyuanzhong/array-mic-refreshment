name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore ArrayMicRefreshment.CI.slnf

      - name: Build
        run: |
          ./scripts/build-libraries.sh
          dotnet build tests/ArrayMicRefreshment.Core.Tests/ArrayMicRefreshment.Core.Tests.csproj -c Release --no-restore

      - name: Test
        run: |
          dotnet test tests/ArrayMicRefreshment.Core.Tests/ArrayMicRefreshment.Core.Tests.csproj -c Release --no-build --verbosity normal
          dotnet test tests/ArrayMicRefreshment.Prompt.Tests/ArrayMicRefreshment.Prompt.Tests.csproj -c Release --no-build --verbosity normal
